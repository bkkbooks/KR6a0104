body:
  text: 西天譯經三藏朝奉大夫試鴻臚卿傳法大師臣施護奉詔譯爾時佛在舍衛國與苾芻衆俱是時佛告苾芻衆言汝等當知有聖法印我今為汝分別演說汝等應起清淨知見諦聽諦受如善作意記念思惟時諸苾芻即白佛言善哉世尊願為宣說我等樂聞佛言苾芻空性無所有無妄想無所生無所滅離諸知見何以故空性無處所無色相非有想本無所生非知見所及離諸有著由離著故攝一切法住平等見是真實見苾芻當知空性如是諸法亦然是名法印復次諸苾芻此法印者即是三解脫門是諸佛根本法為諸佛眼是即諸佛所歸趣故是故汝等諦聽諦受記念思惟如實觀察復次苾芻若有修行者當往林間或居樹下諸寂靜處如實觀察色是苦是空是無常當生厭離住平等見如是觀察受想行識是苦是空是無常當生厭離住平等見諸苾芻諸蘊本空由心所生心法滅已諸蘊無作如是了知即正解脫正解脫已離諸知見是名空解脫門復次住三摩地觀諸色境皆悉滅盡離諸有想如是聲香味觸法亦皆滅盡離諸有想如是觀察名為無想解脫門入是解脫門已即得知見清淨由是清淨故即貪瞋癡皆悉滅盡彼滅盡已住平等見住是見者即離我見及我所見即了諸見無所生起無所依止復次離我見已即無見無聞無覺無知何以故由因緣故而生諸識即彼因緣及所生識皆悉無常以無常故識不可得識蘊既空無所造作是名無作解脫門入是解脫門已知法究竟於法無著證法寂滅佛告諸苾芻如是名為聖法印即是三解脫門汝諸苾芻若修學者即得知見清淨時諸苾芻聞是法已皆大歡喜頂禮信受
